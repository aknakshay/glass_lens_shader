name: glass_lens_shader
description: >-
  A magnifying "glass lens" fragment shader — a rounded-capsule lens that
  barrel-magnifies the content sampled behind it, with a chromatic-aberration
  rim and a translucent glass body. Shipped as a Flutter package so it can be
  added as a dependency; the shader is compiled and bundled automatically and
  loaded at runtime via
  FragmentProgram.fromAsset('packages/glass_lens_shader/shaders/lens.frag').
version: 0.1.0
# Distributed as a git dependency. Remove this line to publish to pub.dev.
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  # Declaring the shader here is what makes Flutter compile it and bundle it
  # into any app that depends on this package, accessible under
  # packages/glass_lens_shader/. The consuming app needs NO shaders: entry.
  shaders:
    - shaders/lens.frag
